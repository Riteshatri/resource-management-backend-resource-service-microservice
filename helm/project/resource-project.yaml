apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: resource-project
  namespace: argocd
spec:
  description: Resource service applications
  sourceRepos:
    # - '*'
    - https://github.com/riteshatri/*
    # - https://github.com/Riteshatri/resource-management-backend-resource-service-microservice
  destinations:
    - namespace: resource-management
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

