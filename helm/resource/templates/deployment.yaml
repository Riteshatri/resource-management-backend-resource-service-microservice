apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "resource.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "resource.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "resource.name" . }}
    spec:
      containers:
        - name: resource
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: {{ include "resource.fullname" . }}-config
            - secretRef:
                name: {{ include "resource.fullname" . }}-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
