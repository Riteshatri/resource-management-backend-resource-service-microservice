apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-service
  namespace: resource-mgmt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-service
  template:
    metadata:
      labels:
        app: resource-service
    spec:
      containers:
      - name: resource-service
        image: riteshacr.azurecr.io/resource-service:v5
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
